services:
  pansou:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,pansou}
        no_proxy: ${NO_PROXY:-localhost,127.0.0.1,pansou}
    image: pansou-gying:local
    pull_policy: build
    container_name: pansou
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PANSOU_HOST_PORT:-3333}:8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./cache:/app/cache
    networks:
      - pansou-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8888/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  pansou-network:
    name: pansou-network
